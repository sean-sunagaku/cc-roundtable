<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    V1: Three symmetric arcs (pinwheel) + warm amber center.
    Uses rotate(120) for mathematically perfect 3-fold symmetry.
    Arc = 100° segment on R=34 circle, offset 15° for pinwheel rotation feel.
  -->
  <defs>
    <path id="arc1" fill="none" stroke-width="10" stroke-linecap="round"
      d="M 44.5,36.2 A 34,34 0 0,1 94.8,49.6"/>
  </defs>
  <!-- Warm center — the outcome of convergence -->
  <circle cx="64" cy="64" r="13" fill="#F59E0B"/>
  <!-- Three arcs, each rotated exactly 120° -->
  <use href="#arc1" stroke="#0D9488" transform="rotate(0, 64, 64)"/>
  <use href="#arc1" stroke="#14B8A6" transform="rotate(120, 64, 64)"/>
  <use href="#arc1" stroke="#0F766E" transform="rotate(240, 64, 64)"/>
</svg>