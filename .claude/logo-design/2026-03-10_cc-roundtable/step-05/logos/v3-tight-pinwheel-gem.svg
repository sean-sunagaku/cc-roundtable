<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    V3: Tighter arcs (R=28) forming a compact pinwheel.
    Center diamond = the gem/value created by convergence.
    Perfect 3-fold symmetry via rotate.
  -->
  <defs>
    <path id="arc3" fill="none" stroke-width="11" stroke-linecap="round"
      d="M 47.9,41.1 A 28,28 0 0,1 89.4,52.2"/>
  </defs>
  <!-- Gold diamond at center — the valuable outcome -->
  <path d="M 64,52 L 76,64 L 64,76 L 52,64 Z" fill="#D4A853"/>
  <!-- Three tight arcs -->
  <use href="#arc3" stroke="#0D9488" transform="rotate(0, 64, 64)"/>
  <use href="#arc3" stroke="#14B8A6" transform="rotate(120, 64, 64)"/>
  <use href="#arc3" stroke="#0F766E" transform="rotate(240, 64, 64)"/>
</svg>