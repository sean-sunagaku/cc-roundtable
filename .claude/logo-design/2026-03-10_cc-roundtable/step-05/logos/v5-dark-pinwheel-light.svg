<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    V5: Dark app-icon background. Bright arcs converge on luminous center.
    Perfect 3-fold symmetry. The light at center = what agents create together.
  -->
  <defs>
    <path id="arc5" fill="none" stroke-width="9" stroke-linecap="round"
      d="M 46.7,37.8 A 32,32 0 0,1 93.0,50.5"/>
  </defs>
  <!-- Dark background -->
  <rect width="128" height="128" rx="28" fill="#0F172A"/>
  <!-- Luminous center — double glow -->
  <circle cx="64" cy="64" r="12" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="64" cy="64" r="6" fill="#CCFBF1"/>
  <!-- Three bright arcs -->
  <use href="#arc5" stroke="#2DD4BF" transform="rotate(0, 64, 64)"/>
  <use href="#arc5" stroke="#5EEAD4" transform="rotate(120, 64, 64)"/>
  <use href="#arc5" stroke="#99F6E4" transform="rotate(240, 64, 64)"/>
</svg>