  <!-- Ring 2: bottom-left -->
  <circle cx="46" cy="78" r="28" fill="none" stroke="#5EEAD4" stroke-width="9" opacity="0.85"/>
  <!-- Ring 3: bottom-right -->
  <circle cx="82" cy="78" r="28" fill="none" stroke="#5EEAD4" stroke-width="9" opacity="0.85"/>
  <!-- Claude agent dots — warm amber, placed at outer edge of each ring -->
  <circle cx="64" cy="14" r="8" fill="#F59E0B"/>
  <circle cx="24" cy="96" r="8" fill="#F59E0B"/>
  <circle cx="104" cy="96" r="8" fill="#F59E0B"/>
</svg>