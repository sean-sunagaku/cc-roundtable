<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <g id="spark">
      <path d="M0,-6 C0.8,-1.5 1.5,-0.8 6,0 C1.5,0.8 0.8,1.5 0,6 C-0.8,1.5 -1.5,0.8 -6,0 C-1.5,-0.8 -0.8,-1.5 0,-6 Z" fill="#FBBF24"/>
    </g>
  </defs>
  <!-- Three thick, bright, overlapping rings — Borromean-style interlock -->
  <!-- Ring 1: top (brightest) -->
  <circle cx="64" cy="40" r="28" fill="none" stroke="#14B8A6" stroke-width="10" stroke-linecap="round"/>
  <!-- Ring 2: bottom-left -->
  <circle cx="45" cy="76" r="28" fill="none" stroke="#2DD4BF" stroke-width="10" stroke-linecap="round"/>
  <!-- Ring 3: bottom-right -->
  <circle cx="83" cy="76" r="28" fill="none" stroke="#5EEAD4" stroke-width="10" stroke-linecap="round"/>
  <!-- Claude sparkle at each ring's outer point -->
  <use href="#spark" transform="translate(64,12) scale(1.3)"/>
  <use href="#spark" transform="translate(23,94) scale(1.3)"/>
  <use href="#spark" transform="translate(105,94) scale(1.3)"/>
</svg>