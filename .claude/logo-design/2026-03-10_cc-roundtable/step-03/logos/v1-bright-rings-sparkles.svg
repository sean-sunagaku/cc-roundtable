<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Three bright overlapping rings with Claude-style sparkle marks at each ring's "seat" -->
  <!-- Ring 1: top -->
  <circle cx="64" cy="42" r="30" fill="none" stroke="#2DD4BF" stroke-width="8" opacity="0.9"/>
  <!-- Ring 2: bottom-left -->
  <circle cx="44" cy="76" r="30" fill="none" stroke="#5EEAD4" stroke-width="8" opacity="0.8"/>
  <!-- Ring 3: bottom-right -->
  <circle cx="84" cy="76" r="30" fill="none" stroke="#99F6E4" stroke-width="8" opacity="0.8"/>
  <!-- Claude sparkle marks — asterisk-style at each ring's outer position -->
  <!-- Sparkle 1 (top of ring 1) -->
  <g transform="translate(64,14)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Sparkle 2 (bottom-left of ring 2) -->
  <g transform="translate(22,94)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Sparkle 3 (bottom-right of ring 3) -->
  <g transform="translate(106,94)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>