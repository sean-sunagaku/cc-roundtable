name: Hook Contracts Check

on:
  push:
    paths:
      - "src/packages/shared-contracts/src/hook-contract.ts"
      - "src/packages/meeting-room-hooks/**"
      - "scripts/generate-hook-contracts.mjs"
      - "scripts/check-hook-literals.mjs"
  pull_request:
    paths:
      - "src/packages/shared-contracts/src/hook-contract.ts"
      - "src/packages/meeting-room-hooks/**"
      - "scripts/generate-hook-contracts.mjs"
      - "scripts/check-hook-literals.mjs"

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm --prefix src/apps/desktop install

      - name: Check contracts.py is up to date
        run: node scripts/generate-hook-contracts.mjs --check

      - name: Check no hardcoded literals in hooks
        run: node scripts/check-hook-literals.mjs
